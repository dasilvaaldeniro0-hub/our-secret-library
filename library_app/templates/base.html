{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Our Library</title>
    <link rel="stylesheet" href="{% static 'library_app/css/style.css' %}">
</head>

<body>

<header>
    <div class="logo">Our Library ❤️</div>

    {% if user.is_authenticated %}
        <a class="logout-link" href="{% url 'logout' %}">Logout</a>
    {% else %}
        <div class="tagline">A private space for our books</div>
    {% endif %}
</header>

{% block content %}
{% endblock %}

</body>
</html>
